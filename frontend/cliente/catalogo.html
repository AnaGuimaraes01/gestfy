<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos - Gestfy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="admin-header">
        <h1>GESTFY</h1>
        <p>Catálogo de Produtos</p>
    </header>

    <main>
        <div class="container">
            <!-- Search e Carrinho -->
            <div class="catalogo-top">
                <input 
                    type="text" 
                    id="buscaInput" 
                    class="barra-busca" 
                    placeholder="Buscar produtos..." 
                >
                <a href="carrinho.html" class="btn btn-carrinho">
                    <span>Carrinho</span>
                </a>
            </div>

            <div id="mensagem" class="msg" style="display: none;"></div>

            <!-- Seção: Em Promoção -->
            <section id="secaoPromocoes" class="destaque-section" style="display: none;">
                <div class="destaque-header">
                    <h2>Em Promoção</h2>
                </div>
                <div id="promotoesContainer" class="catalogo-grid-categoria">
                    <!-- Produtos em promoção carregados aqui -->
                </div>
            </section>

            <!-- Produtos Agrupados por Categoria -->
            <div id="produtosContainer">
                <!-- Produtos agrupados por categoria serão carregados aqui -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 <span>Gestfy</span> - Seu sistema de gestão integrado</p>
    </footer>
    <script src="./js/api.js"></script>
    <script src="./js/produtos.js"></script>
    
</body>
</html>
