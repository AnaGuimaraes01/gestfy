<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Cadastro - Gestfy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <h1>Gestfy</h1>
        <p id="introText">Crie sua conta para continuar.</p>

        <div style="display:flex; gap:10px; margin: 16px 0; flex-wrap:wrap;">
            <button type="button" id="showRegisterBtn">Criar conta</button>
            <button type="button" id="showLoginBtn">Já tenho conta</button>
        </div>

        <section id="registerPanel">
            <h2>Primeiro acesso</h2>
            <form id="registerForm">
                <label for="registerNome">Nome</label>
                <input type="text" id="registerNome" required>
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required>
                <label for="registerSenha">Senha</label>
                <input type="password" id="registerSenha" required>
                <label for="registerTelefone">Telefone</label>
                <input type="text" id="registerTelefone" required>
                <label for="registerEndereco">Endereço</label>
                <input type="text" id="registerEndereco">
                <button type="submit">Cadastrar</button>
            </form>
        </section>

        <section id="loginPanel" hidden>
            <h2>Entrar</h2>
            <form id="loginForm">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required>
                <label for="loginSenha">Senha</label>
                <input type="password" id="loginSenha" required>
                <button type="submit">Entrar</button>
            </form>
        </section>

        <p id="message"></p>
    </main>

    <script>
        const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:8080/api'
            : 'https://gestfy-backend.onrender.com/api';
        const messageEl = document.getElementById('message');
        const registerPanel = document.getElementById('registerPanel');
        const loginPanel = document.getElementById('loginPanel');
        const introText = document.getElementById('introText');
        const showRegisterBtn = document.getElementById('showRegisterBtn');
        const showLoginBtn = document.getElementById('showLoginBtn');

        function showMessage(text) {
            messageEl.textContent = text;
        }

        function setView(mode) {
            const isRegister = mode === 'register';
            registerPanel.hidden = !isRegister;
            loginPanel.hidden = isRegister;
            introText.textContent = isRegister
                ? 'Crie sua conta para continuar.'
                : 'Entre com seu e-mail e senha.';
            showRegisterBtn.disabled = isRegister;
            showLoginBtn.disabled = !isRegister;
        }

        async function requestJson(url, options) {
            const response = await fetch(url, options);
            const contentType = response.headers.get('content-type') || '';
            const data = contentType.includes('application/json') ? await response.json() : await response.text();
            if (!response.ok) {
                const message = typeof data === 'string' ? data : data?.message || 'Erro na operação';
                throw new Error(message);
            }
            return data;
        }

        async function handleLogin(event) {
            event.preventDefault();
            const button = event.currentTarget.querySelector('button');
            button.disabled = true;
            showMessage('');

            try {
                const email = document.getElementById('loginEmail').value;
                const senha = document.getElementById('loginSenha').value;
                const data = await requestJson(`${apiBase}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                localStorage.setItem('gestfyToken', data.token);
                localStorage.setItem('gestfyEmail', data.email || email);
                localStorage.setItem('gestfyHasAccount', 'true');
                window.location.href = 'catalogo.html';
            } catch (error) {
                showMessage(error.message || 'Falha no login');
            } finally {
                button.disabled = false;
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            const button = event.currentTarget.querySelector('button');
            button.disabled = true;
            showMessage('');

            try {
                const nome = document.getElementById('registerNome').value;
                const email = document.getElementById('registerEmail').value;
                const senha = document.getElementById('registerSenha').value;
                const telefone = document.getElementById('registerTelefone').value;
                const endereco = document.getElementById('registerEndereco').value;
                const data = await requestJson(`${apiBase}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha, telefone, endereco })
                });

                localStorage.setItem('gestfyToken', data.token);
                localStorage.setItem('gestfyEmail', data.email || email);
                localStorage.setItem('gestfyHasAccount', 'true');
                window.location.href = 'catalogo.html';
            } catch (error) {
                showMessage(error.message || 'Falha no cadastro');
            } finally {
                button.disabled = false;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', handleLogin);
        document.getElementById('registerForm').addEventListener('submit', handleRegister);
        showRegisterBtn.addEventListener('click', () => setView('register'));
        showLoginBtn.addEventListener('click', () => setView('login'));

        const hasAccount = localStorage.getItem('gestfyHasAccount') === 'true';
        setView(hasAccount ? 'login' : 'register');
    </script>
</body>
</html>
