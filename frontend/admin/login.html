<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestfy Admin - Acesso</title>
    <style>
        :root {
            --rosa: #b03060;
            --rosa-escuro: #7a0c35;
            --rosa-claro: #e89bb3;
            --fundo: #111111;
            --painel: #1d1d1d;
            --texto: #f3f4f6;
            --texto-secundario: #c7c7c7;
            --borda: #3a3a3a;
            --erro: #ff6b6b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #111111, #1f1f1f);
            color: var(--texto);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: min(100%, 460px);
            background: linear-gradient(145deg, var(--painel), #242424);
            border: 1px solid var(--borda);
            border-radius: 18px;
            box-shadow: 0 16px 45px rgba(0, 0, 0, 0.35);
            padding: 32px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .brand-badge {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--rosa), var(--rosa-escuro));
            display: grid;
            place-items: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
        }

        h1 { margin: 0; font-size: 24px; }
        .subtitle { margin: 4px 0 0; color: var(--texto-secundario); font-size: 14px; }

        form { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        label { font-size: 14px; color: var(--texto-secundario); }
        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--borda);
            background: #161616;
            color: var(--texto);
        }

        input:focus { outline: 2px solid rgba(176, 48, 96, 0.25); border-color: var(--rosa); }

        button {
            margin-top: 4px;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--rosa), var(--rosa-escuro));
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled { opacity: 0.7; cursor: wait; }

        .helper {
            margin-top: 18px;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(176, 48, 96, 0.12);
            border: 1px solid rgba(176, 48, 96, 0.25);
            color: #f8d8e4;
            font-size: 14px;
        }

        .message {
            min-height: 20px;
            margin-top: 12px;
            color: var(--erro);
            font-size: 14px;
        }

        .secondary-link {
            display: inline-block;
            margin-top: 14px;
            color: var(--rosa-claro);
            text-decoration: none;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .login-card { padding: 24px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="brand">
            <div class="brand-badge">GF</div>
            <div>
                <h1>Painel Gestfy</h1>
                <p class="subtitle">Acesso administrativo simples e rápido</p>
            </div>
        </div>

        <form id="loginForm">
            <label for="loginEmail">E-mail</label>
            <input id="loginEmail" type="email" placeholder="admin@gestfy.com" required>
            <label for="loginSenha">Senha</label>
            <input id="loginSenha" type="password" placeholder="Digite sua senha" required>
            <button type="submit">Entrar</button>
        </form>

        <div class="helper">
            <strong>Acesso padrão:</strong><br>
            Usuário: admin@gestfy.com<br>
            Senha: dredenciasi
        </div>

        <p class="message" id="message"></p>
        <a class="secondary-link" href="../cliente/login.html">Ir para a área do cliente</a>
    </main>

    <script>
        const apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:8080/api'
            : 'https://gestfy-backend.onrender.com/api';
        const messageEl = document.getElementById('message');

        function showMessage(text) {
            messageEl.textContent = text;
        }

        async function requestJson(url, options) {
            const response = await fetch(url, options);
            const contentType = response.headers.get('content-type') || '';
            const data = contentType.includes('application/json') ? await response.json() : await response.text();
            if (!response.ok) {
                const message = typeof data === 'string' ? data : data?.message || 'Erro na operação';
                throw new Error(message);
            }
            return data;
        }

        document.getElementById('loginForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const button = event.currentTarget.querySelector('button');
            button.disabled = true;
            showMessage('');

            try {
                const email = document.getElementById('loginEmail').value;
                const senha = document.getElementById('loginSenha').value;
                const data = await requestJson(`${apiBase}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                localStorage.setItem('gestfyToken', data.token);
                localStorage.setItem('gestfyEmail', data.email || email);
                localStorage.setItem('gestfyRole', 'ADMIN');
                window.location.href = 'index.html';
            } catch (error) {
                showMessage(error.message || 'Falha no login');
            } finally {
                button.disabled = false;
            }
        });
    </script>
</body>
</html>
