<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa | Gestfy</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--cinza-fundo);
            color: var(--branco);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: linear-gradient(145deg, var(--cinza-card), #242424);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid #3a3a3a;
        }

        /* CABEÇALHO */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #3a3a3a;
        }

        .header h1 {
            color: var(--rosa);
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--cinza-texto);
            font-size: 14px;
        }

        /* STATUS DO CAIXA */
        .status-box {
            background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid var(--rosa);
            border: 1px solid #3a3a3a;
        }

        .status-box.aberto {
            background: linear-gradient(135deg, #1a3a1a 0%, #2a2a2a 100%);
            border-left-color: var(--verde);
        }

        .status-box.fechado {
            background: linear-gradient(135deg, #3a1a1a 0%, #2a2a2a 100%);
            border-left-color: var(--vermelho);
        }

        .status-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .status-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--cinza-texto);
        }

        .status-valor {
            font-size: 24px;
            font-weight: bold;
            color: var(--rosa);
        }

        /* BOTÕES DE AÇÃO */
        .botoes-principais {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--rosa), #d4436a);
            color: var(--branco);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(176, 48, 96, 0.4);
        }

        .btn-primary:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #444;
            color: var(--branco);
            border: 2px solid #555;
        }

        .btn-secondary:hover {
            background: #555;
        }

        .btn-danger {
            background: var(--vermelho);
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #388e3c;
        }

        /* SECTION BUSCA DE PRODUTOS */
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
            border-radius: 8px;
            border: 1px solid #444;
        }

        .section h2 {
            color: var(--rosa-claro);
            font-size: 18px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* BUSCA DE PRODUTO */
        .busca-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .busca-container input {
            flex: 1;
            padding: 12px;
            background: var(--cinza-input);
            border: 1px solid #444;
            color: var(--branco);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .busca-container input::placeholder {
            color: var(--cinza-texto-claro);
        }

        .busca-container input:focus {
            outline: none;
            border-color: var(--rosa);
            box-shadow: 0 0 0 3px rgba(176, 48, 96, 0.1);
        }

        .busca-container button {
            padding: 12px 30px;
        }

        /* LISTA DE PRODUTOS ENCONTRADOS */
        .produtos-encontrados {
            background: var(--cinza-card);
            border: 1px solid #444;
            border-radius: 6px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .produtos-encontrados.ativo {
            display: block;
        }

        .produto-item {
            padding: 12px;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .produto-item:hover {
            background: #333;
        }

        .produto-info {
            flex: 1;
        }

        .produto-nome {
            font-weight: 600;
            color: var(--branco);
            margin-bottom: 4px;
        }

        .produto-detalhes {
            font-size: 12px;
            color: var(--cinza-texto);
        }

        .produto-preco {
            font-weight: bold;
            color: var(--rosa);
            font-size: 16px;
            margin-right: 20px;
        }

        /* FORMULÁRIO DE VENDA */
        .form-venda {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .form-venda.completo {
            grid-template-columns: repeat(4, 1fr);
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--rosa-claro);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-group input {
            padding: 10px;
            background: var(--cinza-input);
            border: 1px solid #444;
            color: var(--branco);
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input::placeholder {
            color: var(--cinza-texto-claro);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--rosa);
            box-shadow: 0 0 0 3px rgba(176, 48, 96, 0.1);
        }

        .form-group input:disabled {
            background: #444;
            cursor: not-allowed;
            color: var(--cinza-texto);
        }

        .form-group .valor {
            font-size: 18px;
            font-weight: bold;
            color: var(--rosa);
            padding: 10px;
        }

        /* RESUMO DE VENDA */
        .resumo-venda {
            background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--rosa);
            display: none;
            border: 1px solid #444;
        }

        .resumo-venda.ativo {
            display: block;
        }

        .resumo-linha {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--cinza-texto);
        }

        .resumo-linha.total {
            border-top: 2px solid var(--rosa);
            padding-top: 10px;
            font-weight: bold;
            font-size: 18px;
            color: var(--rosa);
        }

        .resumo-linha.troco {
            background: linear-gradient(135deg, #3a2a3a 0%, #2a1a2a 100%);
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            color: var(--rosa-claro);
            margin-top: 8px;
            border: 2px solid var(--rosa);
        }

        /* CARRINHO DE ITENS */
        .carrinho-container {
            background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #444;
        }

        .carrinho-container.ativo {
            display: block;
        }

        .carrinho-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #444;
        }

        .carrinho-header h3 {
            color: var(--rosa-claro);
            font-size: 16px;
            margin: 0;
        }

        .carrinho-header .badge {
            background: var(--rosa);
            color: var(--branco);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .carrinho-itens {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .carrinho-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .carrinho-item-info {
            flex: 1;
        }

        .carrinho-item-nome {
            font-weight: 600;
            color: var(--branco);
        }

        .carrinho-item-detalhe {
            font-size: 11px;
            color: var(--cinza-texto);
            margin-top: 2px;
        }

        .carrinho-item-valor {
            font-weight: bold;
            color: var(--rosa);
            min-width: 80px;
            text-align: right;
        }

        .carrinho-item-remove {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 10px;
            transition: background 0.2s;
        }

        .carrinho-item-remove:hover {
            background: #d32f2f;
        }

        .carrinho-totais {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .carrinho-total-item {
            display: flex;
            justify-content: space-between;
        }

        .carrinho-total-item label {
            font-size: 11px;
            color: var(--cinza-texto);
            font-weight: 600;
        }

        .carrinho-total-item .valor {
            font-weight: bold;
            color: var(--rosa);
        }

        .carrinho-botoes {
            display: flex;
            gap: 10px;
        }

        .carrinho-botoes button {
            flex: 1;
            padding: 8px;
            font-size: 12px;
        }

        /* HISTÓRICO DE VENDAS */
        .historico-vendas {
            margin-top: 30px;
        }

        .vendas-lista {
            max-height: 400px;
            overflow-y: auto;
        }

        .venda-item {
            background: #333;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .venda-detalhes {
            flex: 1;
        }

        .venda-produto {
            font-weight: 600;
            color: var(--branco);
            margin-bottom: 4px;
        }

        .venda-info {
            font-size: 12px;
            color: var(--cinza-texto);
        }

        .venda-valor {
            font-weight: bold;
            color: var(--verde);
            font-size: 16px;
        }

        /* MENSAGENS */
        .mensagem {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .mensagem.ativo {
            display: block;
        }

        .mensagem.sucesso {
            background: rgba(52, 168, 83, 0.1);
            color: var(--verde);
            border-left: 4px solid var(--verde);
        }

        .mensagem.erro {
            background: rgba(234, 67, 53, 0.1);
            color: var(--vermelho);
            border-left: 4px solid var(--vermelho);
        }

        .mensagem.info {
            background: rgba(33, 150, 243, 0.1);
            color: #42a5f5;
            border-left: 4px solid #42a5f5;
        }

        /* TOTALIZADORES */
        .totalizadores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .card-total {
            background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #444;
            text-align: center;
        }

        .card-total h3 {
            color: var(--cinza-texto);
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-total .valor {
            font-size: 24px;
            font-weight: bold;
            color: var(--rosa);
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .botoes-principais {
                grid-template-columns: 1fr;
            }

            .form-venda.completo {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }

            .status-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- CABEÇALHO -->
        <div class="header">
            <h1> CAIXA</h1>
            <p>Sistema de vendas em dinheiro</p>
        </div>

        <!-- MENSAGENS -->
        <div id="msg" class="mensagem"></div>

        <!-- STATUS DO CAIXA -->
        <div id="statusBox" class="status-box">
            <div class="status-info">
                <span class="status-text">
                    Caixa: <span id="statusText">Fechado</span>
                </span>
                <span class="status-valor">
                    Total: R$ <span id="totalDia">0.00</span>
                </span>
            </div>
        </div>

        <!-- BOTÕES PRINCIPAIS -->
        <div class="botoes-principais">
            <button class="btn btn-primary" id="btnAbrirCaixa" onclick="abrirCaixa()">✓ Abrir Caixa</button>
            <button class="btn btn-danger" id="btnFecharCaixa" onclick="fecharCaixa()" disabled>✕ Fechar Caixa</button>
        </div>

        <!-- SEÇÃO DE BUSCA E VENDA -->
        <div id="secaoVenda" style="display: none;">
            <!-- BUSCAR PRODUTO -->
            <div class="section">
                <h2>Buscar Produto</h2>
                <div class="busca-container">
                    <input type="text" id="buscaProduto" placeholder="Digite o nome do produto..." autocomplete="off">
                    <button class="btn btn-primary" onclick="buscarProduto()"> Buscar</button>
                </div>
                <div id="produtosEncontrados" class="produtos-encontrados"></div>
            </div>

            <!-- FORMULÁRIO DE VENDA -->
            <div class="section">
                <h2>Registrar Venda</h2>

                <!-- VENDA ATUAL - LISTA DE PRODUTOS SELECIONADOS -->
                <div id="vendaAtualContainer" class="carrinho-container">
                    <div class="carrinho-header">
                        <h3>📋 Venda Atual</h3>
                        <span class="badge">
                            <span id="vendaAtualQtd">0</span> tipo(s)
                        </span>
                    </div>
                    <div id="vendaAtualItens" class="carrinho-itens"></div>
                    <div class="carrinho-totais">
                        <div class="carrinho-total-item">
                            <label>Total de Unidades:</label>
                            <span id="vendaAtualTotalItens" class="valor">0</span>
                        </div>
                        <div class="carrinho-total-item">
                            <label>Valor Total:</label>
                            <span id="vendaAtualValorTotal" class="valor">R$ 0.00</span>
                        </div>
                    </div>
                </div>

                <!-- FORMULÁRIO DE VENDA SIMPLIFICADO -->
                <!-- Apenas o campo de valor recebido fica visível quando há itens na venda -->
                <div id="formularioVendaContainer" class="section" style="display: none; margin-top: 20px;">
                    <h2>Finalizar Venda</h2>
                    <div class="form-venda completo">
                        <div class="form-group">
                            <label>Valor Total a Receber</label>
                            <input type="text" id="valorTotalVenda" placeholder="R$ 0.00" disabled style="font-size: 18px; font-weight: bold; color: var(--rosa);">
                        </div>
                        <div class="form-group">
                            <label>Valor Recebido (em dinheiro)</label>
                            <input type="number" id="valorRecebido" placeholder="0.00" min="0" step="0.01" oninput="calcularTroco()" style="font-size: 18px;">
                        </div>
                        <div class="form-group">
                            <label>TROCO</label>
                            <input type="text" id="trocoValor" placeholder="R$ 0.00" disabled style="font-size: 18px; font-weight: bold; color: var(--rosa); background: #1a3a1a;">
                        </div>
                    </div>
                </div>

                <!-- BOTÕES DE VENDA -->
                <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button class="btn btn-success" id="btnConfirmarVenda" onclick="confirmarVenda()" style="display: none;">💾 Confirmar Venda</button>
                    <button class="btn btn-secondary" id="btnLimparVenda" onclick="limparFormulario()" style="display: none;">↻ Limpar Tudo</button>
                </div>
            </div>

            <!-- HISTÓRICO DE VENDAS DO DIA -->
            <div class="section">
                <h2>Vendas do Dia</h2>

                <div class="totalizadores">
                    <div class="card-total">
                        <h3>Total de Vendas</h3>
                        <div class="valor" id="totalVendas">0</div>
                    </div>
                    <div class="card-total">
                        <h3>Total Arrecadado</h3>
                        <div class="valor">R$ <span id="totalArrecadado">0.00</span></div>
                    </div>
                </div>

                <div id="vendasLista" class="vendas-lista"></div>
            </div>
        </div>
    </div>

    <script src="../js/caixa-novo.js"></script>
</body>

</html>
