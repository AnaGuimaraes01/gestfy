<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestfy • Produtos</title>
  <link rel="icon" href="../images/logo.png">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="admin-body">

<header class="admin-header">
  <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
    <button onclick="history.back()" class="btn-voltar" title="Voltar">←</button>
    <div style="flex: 1; min-width: 200px;">
      <h1>Gestão de Produtos</h1>
      <p class="subtitle">Cadastro e edição de produtos</p>
    </div>
  </div>
</header>

<main class="container">

  <!-- FORMULÁRIO -->
  <div class="card form-card">
    <h2 class="section-title">Novo Produto</h2>

    <form id="produtoForm" class="form-grid">
      <!-- Linha 1: Nome e Descrição -->
      <div class="form-group">
        <label>Nome do Produto *</label>
        <input id="nome" placeholder="Ex: Sorvete de Morango" required>
      </div>
      <div class="form-group">
        <label>Descrição *</label>
        <input id="descricao" placeholder="Ex: Sorvete natural feito com frutas frescas" required>
      </div>

      <!-- Linha 2: Preço, Quantidade e URL -->
      <div class="form-group">
        <label>Preço (R$) *</label>
        <input id="preco" type="number" step="0.01" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label>Quantidade *</label>
        <input id="quantidade" type="number" min="1" placeholder="0" required>
      </div>
      <div class="form-group">
        <label>URL da Imagem</label>
        <input id="urlFoto" placeholder="https://exemplo.com/imagem.jpg">
      </div>

      <!-- Linha 3: Categoria (com opção de criar nova) -->
      <div class="form-group categoria-section" style="grid-column: 1 / -1;">
        <label>Categoria *</label>
        <div class="categoria-wrapper">
          <select id="categoria" required class="categoria-select">
            <option value="">Selecione uma categoria</option>
          </select>
          <button type="button" id="btnToggleCriarCategoria" class="btn-add-categoria" title="Criar nova categoria">+</button>
        </div>
        
        <div id="criarCategoriaBox" class="criar-categoria-box" style="display: none;">
          <input id="novaCategoria" placeholder="Nome da nova categoria" maxlength="50">
          <button type="button" id="btnCriarCategoria" class="btn-criar-categoria">Criar</button>
          <button type="button" id="btnCancelarCategoria" class="btn-cancelar-categoria" style="display: none;">Cancelar</button>
        </div>
        <div id="msgCategoria" class="msg-categoria" style="display: none;"></div>
      </div>

      <!-- Linha 4: Promoção -->
      <div class="form-group promo-section" style="grid-column: 1 / -1;">
        <label>Promoção</label>
        <div class="promo-wrapper">
          <label class="checkbox-promo">
            <input id="emPromo" type="checkbox">
            <span>Este produto está em promoção</span>
          </label>
        </div>
      </div>

      <!-- Linha 5: Preço Promocional (condicional) -->
      <div class="form-group" id="grupoPrecoPromo" style="display: none; grid-column: 1 / -1;">
        <label>Preço Promocional (R$) *</label>
        <input id="precoPromo" type="number" step="0.01" placeholder="0.00">
      </div>

      <!-- Botões de Ação -->
      <div style="grid-column: 1 / -1; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
        <button type="submit" id="btnSalvar" class="btn btn-primary">Salvar Produto</button>
        <button type="button" id="btnCancelar" onclick="cancelarEdicao()" style="display: none;" class="btn btn-secondary">Cancelar Edição</button>
      </div>

      <p id="msg" class="msg" style="grid-column: 1 / -1;"></p>
    </form>
  </div>

  <!-- LISTA -->
  <div class="card card-full">
    <h2 class="section-title">Produtos Cadastrados</h2>
    <ul id="produtosList" class="lista-produtos"></ul>
  </div>

</main>

<footer>
  <p>© 2025 <span>Gestfy</span> • Gestão de Produtos</p>
</footer>

<script src="../js/admin-menu.js"></script>
<script src="../js/api.js"></script>
<script src="../js/produtos.js"></script>

<style>
  .btn-voltar { 
    background: none; 
    border: none; 
    font-size: 24px; 
    color: var(--rosa); 
    cursor: pointer; 
    padding: 8px;
    min-width: 48px;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }
  .btn-voltar:hover { 
    opacity: 0.8; 
  }

  .categoria-wrapper {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  .categoria-select {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: var(--branco);
    font-size: 14px;
    transition: border-color 0.2s;
  }

  .categoria-select:hover,
  .categoria-select:focus {
    border-color: var(--rosa);
    outline: none;
  }

  .btn-add-categoria {
    width: 44px;
    height: 44px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    background: var(--rosa);
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .btn-add-categoria:hover {
    background: var(--rosa-escuro);
  }

  .criar-categoria-box {
    display: flex;
    gap: 8px;
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    margin-top: 8px;
  }

  .criar-categoria-box input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--branco);
    font-size: 14px;
  }

  .criar-categoria-box input::placeholder {
    color: rgba(255,255,255,0.5);
  }

  .btn-criar-categoria,
  .btn-cancelar-categoria {
    padding: 10px 16px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-criar-categoria {
    background: var(--rosa);
    color: white;
  }

  .btn-criar-categoria:hover {
    background: var(--rosa-escuro);
  }

  .btn-cancelar-categoria {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }

  .btn-cancelar-categoria:hover {
    background: rgba(255,255,255,0.15);
  }

  .msg-categoria {
    font-size: 13px;
    padding: 8px;
    border-radius: 4px;
    margin-top: 8px;
  }

  .msg-categoria.success {
    background: rgba(76, 175, 80, 0.2);
    color: #4caf50;
    border: 1px solid rgba(76, 175, 80, 0.3);
  }

  .msg-categoria.error {
    background: rgba(244, 67, 54, 0.2);
    color: #f44;
    border: 1px solid rgba(244, 67, 54, 0.3);
  }

  .msg-categoria.info {
    background: rgba(255, 152, 0, 0.2);
    color: #ff9800;
    border: 1px solid rgba(255, 152, 0, 0.3);
  }

  .promo-section {
    padding: 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
  }

  .checkbox-promo {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 14px;
  }

  .checkbox-promo input {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .btn.btn-primary {
    background: var(--rosa);
    color: white;
    border: none;
    padding: 12px 24px;
    font-weight: 600;
    transition: background-color 0.2s;
    flex: 1;
    min-width: 140px;
  }

  .btn.btn-primary:hover {
    background: var(--rosa-escuro);
  }

  .btn.btn-secondary {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px 24px;
    font-weight: 600;
    transition: all 0.2s;
    flex: 1;
    min-width: 140px;
  }

  .btn.btn-secondary:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
  }

  /* Form labels */
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Responsivo */
  @media (max-width: 768px) {
    .categoria-wrapper {
      flex-direction: column;
    }

    .btn-add-categoria {
      width: 100%;
    }

    .criar-categoria-box {
      flex-direction: column;
    }

    .btn.btn-primary,
    .btn.btn-secondary {
      width: 100%;
    }

    .form-group {
      grid-column: 1 / -1;
    }
  }
</style>
</body>
</html>
